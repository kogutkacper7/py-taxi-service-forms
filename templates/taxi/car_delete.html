{% extends "base.html" %}

{%  block content %}
  <h1>Delete Car</h1>
  <p>
    Are you sure you want to delete the car: {{ car }}?
  </p>
  <p>
    All data with this car will be also deleted!
  </p>

  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes, I'm sure." class="btn btn-danger">
    <a href="{% url "taxi:car-list" %}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
